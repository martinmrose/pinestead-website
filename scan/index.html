<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Martin Rose · Pinestead Succession</title>
  <meta name="description" content="Digital business card for Martin Rose, Pinestead Succession." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="../assets/pinestead-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #1b4332;
      --green-deep: #14331f;
      --cream: #ecebe3;
      --paper: #ffffff;
      --ink: #232826;
      --muted: #54605a;
      --accent: #b08a3e;
      --line: #e2e0d6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Mulish", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, #1b4332 0%, #14331f 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 40px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--paper);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 30px 60px -24px rgba(0, 0, 0, 0.55);
    }
    .cover {
      height: 124px;
      background:
        radial-gradient(120% 140% at 80% -20%, rgba(176, 138, 62, 0.35), transparent 60%),
        linear-gradient(135deg, var(--green) 0%, var(--green-deep) 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 22px;
    }
    .cover img { height: 30px; width: auto; filter: brightness(0) invert(1); }
    .avatar-wrap { display: flex; justify-content: center; margin-top: -58px; }
    .avatar {
      width: 116px;
      height: 116px;
      border-radius: 50%;
      object-fit: cover;
      object-position: 50% 22%;
      border: 5px solid var(--paper);
      box-shadow: 0 8px 22px -8px rgba(0, 0, 0, 0.4);
      background: var(--cream);
    }
    .identity { text-align: center; padding: 14px 24px 4px; }
    .identity h1 {
      font-family: "Jost", sans-serif;
      font-weight: 400;
      font-size: 1.7rem;
      color: var(--green);
      margin: 0;
    }
    .identity .role { color: var(--accent); font-weight: 600; font-size: 0.9rem; letter-spacing: 0.04em; margin: 6px 0 2px; }
    .identity .org { color: var(--muted); font-size: 0.95rem; margin: 0; }
    .actions { padding: 22px 24px 8px; display: flex; flex-direction: column; gap: 12px; }
    .action {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fbfaf5;
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: transform 0.1s ease, border-color 0.15s ease, background 0.15s ease;
    }
    .action:hover { border-color: var(--accent); }
    .action:active { transform: scale(0.99); }
    .action .ico {
      flex: 0 0 22px;
      width: 22px;
      height: 22px;
      color: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action .sub { display: block; font-weight: 400; font-size: 0.82rem; color: var(--muted); }
    .action.primary { background: var(--green); border-color: var(--green); color: #fff; }
    .action.primary .ico { color: #fff; }
    .action.primary:hover { background: var(--green-deep); }
    .foot { text-align: center; padding: 18px 24px 26px; }
    .foot a { color: var(--green); text-decoration: none; font-size: 0.9rem; font-weight: 600; }
    .foot .legal { color: var(--muted); font-size: 0.72rem; margin-top: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <main class="card">
    <div class="cover">
      <img src="../assets/pinestead-favicon.png" alt="Pinestead Succession" />
    </div>
    <div class="avatar-wrap">
      <img class="avatar" src="../assets/martin-headshot-orig.webp" alt="Martin Rose" />
    </div>
    <div class="identity">
      <h1>Martin Rose</h1>
      <p class="role">SUCCESSION ENTREPRENEUR</p>
      <p class="org">Pinestead Succession</p>
    </div>

    <div class="actions">
      <a id="save" class="action primary" href="#">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        </span>
        <span>Save to contacts<span class="sub">Add Martin to your phone</span></span>
      </a>

      <a id="email" class="action" href="#">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>
        </span>
        <span>Email<span id="email-sub" class="sub">…</span></span>
      </a>

      <a class="action" href="https://www.linkedin.com/in/pinestead" target="_blank" rel="noopener">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/></svg>
        </span>
        <span>LinkedIn<span class="sub">linkedin.com/in/pinestead</span></span>
      </a>

      <a class="action" href="https://www.pinestead.co.uk">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </span>
        <span>Website<span class="sub">pinestead.co.uk</span></span>
      </a>
    </div>

    <div class="foot">
      <p class="legal">Pinestead Succession Ltd · Company No. 17179822 · England &amp; Wales</p>
    </div>
  </main>

  <script>
    (function () {
      var addr = 'martin' + '@' + 'pinestead' + '.co' + '.uk';

      // Email action
      var emailLink = document.getElementById('email');
      emailLink.setAttribute('href', 'mailto:' + addr);
      document.getElementById('email-sub').textContent = addr;

      // vCard, built in-browser and downloaded on tap
      var vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'N:Rose;Martin;;;',
        'FN:Martin Rose',
        'ORG:Pinestead Succession Ltd',
        'TITLE:Succession Entrepreneur',
        'EMAIL;TYPE=WORK:' + addr,
        'URL:https://www.pinestead.co.uk',
        'X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/in/pinestead',
        'END:VCARD'
      ].join('\r\n');

      var save = document.getElementById('save');
      save.addEventListener('click', function (e) {
        e.preventDefault();
        var blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'martin-rose.vcf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      });
    })();
  </script>
</body>
</html>
